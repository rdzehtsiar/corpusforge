# SPDX-License-Identifier: Apache-2.0
sonar.projectKey=rdzehtsiar_corpusforge
sonar.organization=raman-dzehtsiar
sonar.projectName=Corpus Forge
sonar.sourceEncoding=UTF-8
sonar.sources=.
sonar.rust.lcov.reportPaths=lcov.info

# Cargo workspaces share one Cargo.lock at the repository root.
# Fixtures intentionally contain malformed and security-sensitive examples for scanner tests.
# Keep root analysis and avoid false positives on standalone member manifests.
sonar.exclusions=target/**,fixtures/**,reports/**,qodana.sarif.json,crates/**/Cargo.toml
sonar.sca.exclusions=crates/**/Cargo.toml
